name: fmt

on:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"
      - run: zig fmt --check build.zig build.zig.zon src
      - if: failure()
        run: echo "::error::Formatting check failed. Run 'zig build fmt' locally to fix, then commit and push."
